<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>个人主站</title>
    <link rel="icon" href="/img/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
        }

        canvas#cursor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99;
            pointer-events: none;
        }

        html {
            cursor: url(./img/pointer24px.ico), auto;
        }

        .center {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 99;
        }

        a {
            color: #999999;
            font-weight: bold;
            text-decoration: none;
        }

        .inBase {
            color: red;
            font-weight: bold;
            text-decoration: none;
        }

        #footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 32px;
            padding-top: 15px;
            background-color: #f5f5f5;
            text-align: center;
            font-size: 15px;
            color: #999;
            z-index: 99;
        }

        #canvas {
            display: block;
            background: linear-gradient(#ffffff, #ffffff);
            width: 100%;
            z-index: -1;
        }

        #color-bar-left {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 30px;
            height: 100%;
            background-color: #1a87f3;
            transition: width 0.3s ease
        }

        #color-bar-right {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 30px;
            height: 100%;
            background-color: #1a87f3;
            transition: width 0.3s ease
        }

        #color-bar-left:hover,
        #color-bar-right:hover {
            width: 70px;
            background-color: #117fee;
        }

        @media (max-width: 768px) {
            #footer {
                font-size: 12px;
                padding: 5px 0;
                z-index: 99;
            }
        }

        .volume-slider {
            position: relative;
            top: -150px;
            width: 200px;
            height: 10px;
            margin: 20px auto;
            background-color: #ccc;
            border-radius: 5px;
        }

        .slider-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #f2f2f2;
            border-radius: 5px;
        }

        .slider-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: #1e90ff;
            border-radius: 5px;
        }

        .slider-handle {
            position: absolute;
            top: -5px;
            left: calc(50%);
            width: 20px;
            height: 20px;
            background-color: #1e90ff;
            border-radius: 50%;
            cursor: pointer;
        }

        #prevBtn,
        #nextBtn {
            position: relative;
            top: 45px;
            background-color: #ffffff;
            border: 2px solid #e0e4e9;
            color: #1e90ff;
            padding: 3px 10px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 7px;
            cursor: pointer;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
        }

        #prevBtn:active,
        #nextBtn:active {
            filter: brightness(70%);
        }

        #timer {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px;
            font-size: 20px;
            color: rgba(30, 144, 255);
            z-index: 99;
        }

        .hidden {
            position: absolute;
            left: 25%;
            top: 50%;
            transform: translateY(-50%);
            display: block;
            color: #7FFF00;
        }

        .visible {
            position: absolute;
            right: 25%;
            top: 50%;
            transform: translateY(-50%);
            display: block;
            color: #7FFF00;
        }

        .tip{
            font-size: 14px;
            color: #999999;
            margin-bottom: 5px
        }
    </style>

    <div class="center">

            <div class="slider-bg"></div>
            <div class="slider-progress"></div>

        </div>
        <p>

<script>
		window.onload = ((function() {
			var callbacks = []
			  , timeLimit = 50
			  , open = false;
			setInterval(loop, 1);
			return {
				addListener: function(fn) {
					callbacks.push(fn);
				},
				cancleListenr: function(fn) {
					callbacks = callbacks.filter(function(v) {
						return v !== fn;
					});
				}
			}

			function loop() {
				var startTime = new Date();
				debugger ;if (new Date() - startTime > timeLimit) {
					if (!open) {
						callbacks.forEach(function(fn) {
							fn.call(null);
						});
					}
					open = true;
					window.stop();
					alert("请关闭控制台重新载入界面")
					document.body.innerHTML = "";
				} else {
					open = false;
				}
			}
		}
		)()).addListener(function() {
			window.location.reload();
		});

		document.onkeydown = function() {
			if (window.event && window.event.keyCode == 123) {
				event.keyCode = 0;
				event.returnValue = false;
				return false;
			}

		};

		//屏蔽右键菜单
		document.oncontextmenu = function(event) {
			if (window.event) {
				event = window.event;
			}
			try {
				var the = event.srcElement;
				if (!((the.tagName == "INPUT" && the.type.toLowerCase() == "text") || the.tagName == "TEXTAREA")) {
					return false;
				}
				return true;
			} catch (e) {
				return false;
			}
		}
	</script>
    <script>

        //计时器
        var startTime = null;
        var timerInterval = null;
        var elapsedTime = 0; // 记录已经经过的时间
        var timerEl = document.getElementById('timer');
        function startTimer() {
            startTime = Date.now() - elapsedTime; // 使用上次记录的时间作为开始时间
            timerInterval = setInterval(updateTimer, 1000);
        }
        function updateTimer() {
            elapsedTime = Date.now() - startTime; // 更新已经经过的时间
            var hours = Math.floor(elapsedTime / (1000 * 60 * 60));
            var minutes = Math.floor((elapsedTime % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((elapsedTime % (1000 * 60)) / 1000);
            timerEl.innerHTML = "随机播放中: " + pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
            timerEl.style.color = 'rgba(30, 144, 255)';
        }
        function pad(num) {
            return ('0' + num).slice(-2);

            // 创建音频上下文
            let oCtx = new AudioContext();

            let audioSrc = oCtx.createMediaElementSource(oAudio);
            // 创建分析器
            let analyser = oCtx.createAnalyser();
            // 连接音频源和分析器
            audioSrc.connect(analyser);

            analyser.connect(oCtx.destination);

            let bufferLength = analyser.frequencyBinCount;

            let dataArray = new Uint8Array(bufferLength);
            console.log(dataArray);

            // 计算每个条形图的宽度
            let barWidth = WIDTH / bufferLength;
            let barHeight;
            // 绘制条形图
            function draw() {
                // 获取频率数据
                analyser.getByteFrequencyData(dataArray);
                let x = 0;

        sliderHandle.addEventListener("mousedown", handleMouseDown);
        sliderHandle.addEventListener("touchstart", handleMouseDown);
        function handleMouseDown(event) {
            event.preventDefault();
            document.addEventListener("mousemove", handleMouseMove);
            document.addEventListener("touchmove", handleMouseMove);
            document.addEventListener("mouseup", handleMouseUp);
            document.addEventListener("touchend", handleMouseUp);
            handleMouseMove(event);
        }
        // 鼠标移动或触摸移动事件，更新音量控制元素位置和音量值
        function handleMouseMove(event) {
            const sliderWidth = slider.offsetWidth;
            const handleWidth = sliderHandle.offsetWidth;
            const sliderLeft = slider.getBoundingClientRect().left;
            const clientX =
                event.type === "touchmove" ? event.touches[0].clientX : event.clientX;
            let position = clientX - sliderLeft - handleWidth / 2;
            position = Math.max(0, Math.min(position, sliderWidth - handleWidth));
            const progress = position / (sliderWidth - handleWidth);
            volume = Math.round(progress * 100);
            setVolume();
            updateSlider(position);
        }
        // 鼠标抬起或触摸结束事件，停止拖动音量控制元素
        function handleMouseUp(event) {
            document.removeEventListener("mousemove", handleMouseMove);
            document.removeEventListener("touchmove", handleMouseMove);
            document.removeEventListener("mouseup", handleMouseUp);
            document.removeEventListener("touchend", handleMouseUp);
        }

        function setVolume() {
            // 设置音量
            const audio = document.querySelector("audio");
            if (audio) {
                audio.volume = volume / 100;
            }
        }

        function updateSlider(position) {
            sliderProgress.style.width = position + "px";
            sliderHandle.style.left = position + "px";
            sliderHandle.setAttribute("aria-valuenow", volume);
        }

        let oAudio = document.getElementById("myaudio");
        // 设置跨域属性
        oAudio.crossOrigin = "anonymous";
        // 获取画布宽高
        let WIDTH = canvas.width;
        let HEIGHT = canvas.height;
        //随机数
        function getRandom() {
            const array = new Uint32Array(2);
            crypto.getRandomValues(array);
            const randomNum = (array[0] * Math.pow(2, 20) + array[1]) / Math.pow(2, 52);
            return randomNum;
        }
        // 随机选择音频文件
        let audioNum = Math.floor(getRandom() * audioArray.length);
        // 设置音频文件路径
        oAudio.src = `./music/${audioArray[audioNum]}`;
        // 双击事件，控制音频播放暂停
        window.ondblclick = function () {
            if (oAudio.paused) {
                oAudio.play();
                startTimer();
            } else {
                oAudio.pause();
                clearInterval(timerInterval); // 停止计时器
            }
            document.addEventListener('DOMContentLoaded', function () {
                //在这里添加需要在页面加载完成后执行的代码
                startTimer(); // 启动计时器
            });
            // 创建音频上下文
            let oCtx = new AudioContext();
            // 创建音频源
            let audioSrc = oCtx.createMediaElementSource(oAudio);
            // 创建分析器
            let analyser = oCtx.createAnalyser();
            // 连接音频源和分析器
            audioSrc.connect(analyser);
            // 连接分析器和目标
            analyser.connect(oCtx.destination);
            // 设置FFT大小
            analyser.fftSize = 2048;
            // 获取频率数据长度
            let bufferLength = analyser.frequencyBinCount;
            console.log(bufferLength);
            // 创建数据数组
            let dataArray = new Uint8Array(bufferLength);
            console.log(dataArray);
            console.log(dataArray.length);
            // 计算每个条形图的宽度
            let barWidth = WIDTH / bufferLength;
            let barHeight;
            // 绘制条形图
            function draw() {
                // 获取频率数据
                analyser.getByteFrequencyData(dataArray);
                let x = 0;
                // 清空画布
                ctx.clearRect(0, 0, WIDTH, canvas.height);
                // 绘制条形图
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i];
                    ctx.fillStyle = "rgb(30,144,255)";
                    ctx.fillRect(WIDTH / 2 + x + 3, canvas.height, barWidth, -barHeight);
                    ctx.fillRect(WIDTH / 2 - x, canvas.height, barWidth, -barHeight);
                    x += barWidth + 1;
                }
                // 循环绘制
                window.requestAnimationFrame(draw);
            }
            draw();
        };
        //避免用户窗口高度不够
        window.addEventListener('resize', function () {

            if (windowHeight < 700) {

        function resizeCanvas() {

            HEIGHT = canvas.height; // 更新HEIGHT的值

        if (/Win/.test(navigator.userAgent)) {

        // 音频播放结束事件，随机选择下一个音频文件并播放
        oAudio.onended = function () {
            console.log("播放开始");
            audioNum = Math.floor(Math.random() * audioArray.length);
            oAudio.src = `./music/${audioArray[audioNum]}`;
            oAudio.play();
        };
        // 初始音量为50
        let volume = 50;
        // 获取音量控制元素
        const slider = document.querySelector(".volume-slider");
        const sliderBg = document.querySelector(".slider-bg");
        const sliderProgress = document.querySelector(".slider-progress");
        const sliderHandle = document.querySelector(".slider-handle");
        // 鼠标按下或触摸开始事件，开始拖动音量控制元素
        sliderHandle.addEventListener("mousedown", handleMouseDown);
        sliderHandle.addEventListener("touchstart", handleMouseDown);
        function handleMouseDown(event) {
            event.preventDefault();
            document.addEventListener("mousemove", handleMouseMove);
            document.addEventListener("touchmove", handleMouseMove);
            document.addEventListener("mouseup", handleMouseUp);
            document.addEventListener("touchend", handleMouseUp);
            handleMouseMove(event);
        }
        // 鼠标移动或触摸移动事件，更新音量控制元素位置和音量值
        function handleMouseMove(event) {
            const sliderWidth = slider.offsetWidth;
            const handleWidth = sliderHandle.offsetWidth;
            const sliderLeft = slider.getBoundingClientRect().left;
            const clientX =
                event.type === "touchmove" ? event.touches[0].clientX : event.clientX;
            let position = clientX - sliderLeft - handleWidth / 2;
            position = Math.max(0, Math.min(position, sliderWidth - handleWidth));
            const progress = position / (sliderWidth - handleWidth);
            volume = Math.round(progress * 100);
            setVolume();
            updateSlider(position);
        }
        // 鼠标抬起或触摸结束事件，停止拖动音量控制元素
        function handleMouseUp(event) {
            document.removeEventListener("mousemove", handleMouseMove);
            document.removeEventListener("touchmove", handleMouseMove);
            document.removeEventListener("mouseup", handleMouseUp);
            document.removeEventListener("touchend", handleMouseUp);
        }

        function setVolume() {
            // 设置音量
            const audio = document.querySelector("audio");
            if (audio) {
                audio.volume = volume / 100;
            }
        }

        function updateSlider(position) {
            sliderProgress.style.width = position + "px";
            sliderHandle.style.left = position + "px";
            sliderHandle.setAttribute("aria-valuenow", volume);
        }

        window.onerror = function (message, source, lineno, colno, error) {
            return true;
        };

        document.addEventListener(
            "contextmenu",
            function (e) {
                e.preventDefault();
            },
            false
        );

        document.addEventListener("keydown", function (event) {
            if (event.keyCode == 123) {
                //快速点击F12可以强制进入控制台，要保密哦 ! ! !   不然就不给你进啦
                var password = prompt("请输入管理员口令 | 目前共收录" + audioArray.length + "首");
                if (password !== "xhhx") {
                    event.preventDefault();
                }
            }
        });

        setPageSize();
        window.addEventListener("resize", setPageSize);

        function prevSong() {
            audioNum--;
            if (audioNum < 0) {
                audioNum = audioArray.length - 1;
            }
            oAudio.src = `./music/${audioArray[audioNum]}`;
            oAudio.play();
        }

        function nextSong() {
            audioNum++;
            if (audioNum >= audioArray.length) {
                audioNum = 0;
            }
            oAudio.src = `./music/${audioArray[audioNum]}`;
            oAudio.play();
        }

    </script>

    <script type="text/javascript">
        window.onload = function () {
            var isWindows = navigator.userAgent.indexOf("Windows") != -1; // 检测是否为Windows
            if (isWindows) {
                function rainAnimation(time) {
                    setInterval(() => {
                        // 创建rain
                        var rain = document.createElement("div");
                        //初始化rain
                        //rain.style.z-index: 1;
                        rain.style.position = "fixed"; //相对于视窗定位
                        rain.style.height = "2px"; // 将高度和宽度交换
                        rain.style.width = "45px"; // 将高度和宽度交换
                        rain.style.backgroundColor = "#e4edff";
                        rain.style.filter = "blur(1px)";
                        rain.style.top = Math.random() * 1080 + "px"; // 垂直随机出现
                        rain.style.left = "0"; // 从左侧开始
                        rain.style.opacity = parseInt(Math.random() * 10) / 10 + ""; // 随机透明度
                        // 向body里添加子节点rain
                        document.body.appendChild(rain);
                        // rain动画
                        var timer = setInterval(() => {
                            var left = parseInt(rain.style.left); // 获取当前距离左侧的距离
                            var i = 1;
                            i++;
                            rain.style.left = left + 5 * Math.pow(i, 2) + "px"; // 水平运动
                            if (left >= 1920) { // 判断距离左侧是否大于视窗宽度
                                clearInterval(timer);
                                rain.parentNode.removeChild(rain);
                            }
                        }, time);
                    });
                }
                rainAnimation(25);
            }
        };
    </script>
